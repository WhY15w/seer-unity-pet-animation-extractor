<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0" />
    <title>Unity Mesh Animation WebGL Player</title>
    <style>
      html,
      body {
        margin: 0;
        overflow: hidden;
        width: 100%;
        height: 100%;
      }
      body {
        background: #222;
        display: flex;
        flex-direction: column;
        align-items: center;
        font-family: sans-serif;
      }
      canvas {
        border: 1px solid #444;
        margin-top: 20px;
        max-width: 100vw;
        max-height: calc(100vh - 80px);
      }
      #controls {
        margin: 10px;
        color: #fff;
      }
      select,
      input {
        margin: 0 5px;
      }
      #info {
        color: #888;
        font-size: 12px;
        margin-top: 5px;
      }
    </style>
  </head>
  <body>
    <div id="controls">
      <label
        >序列:
        <select id="sequenceSelect"></select
      ></label>
      <label
        >速度:
        <input
          type="range"
          id="speed"
          min="0.1"
          max="3"
          step="0.1"
          value="1"
      /></label>
      <label
        >缩放:
        <input
          type="range"
          id="scale"
          min="50"
          max="300"
          value="120"
      /></label>
      <button id="pauseBtn">暂停</button>
    </div>
    <canvas id="glCanvas"></canvas>
    <div id="info"></div>

    <script>
      // UV 解码工具
      function decodeUVFixed16(val) {
        const u = ((val >>> 16) & 0xffff) / 65536.0;
        const v = (val & 0xffff) / 65536.0;
        return [u, v];
      }

      // WebGL 初始化index
      const canvas = document.getElementById("glCanvas");
      const gl = canvas.getContext("webgl", {
        alpha: true,
        premultipliedAlpha: false,
      });
      if (!gl) {
        alert("WebGL not supported");
        throw new Error("WebGL not supported");
      }

      // 顶点着色器
      const vsSource = `
    attribute vec2 a_position;
    attribute vec2 a_texCoord;
    varying vec2 v_texCoord;
    uniform vec2 u_resolution;
    uniform vec2 u_offset;
    uniform float u_scale;

    void main() {
        // 将顶点坐标转换为屏幕坐标
        vec2 screenPos = u_offset + a_position * u_scale;
        // 转换到裁剪空间 (-1 到 1)
        vec2 clipSpace = ((screenPos / u_resolution) * 2.0) - 1.0;
         // Y轴
        gl_Position = vec4(clipSpace, 0, 1);
        v_texCoord = a_texCoord;
    }
`;

      // 片段着色器
      const fsSource = `
    precision mediump float;
    varying vec2 v_texCoord;
    uniform sampler2D u_image;
    uniform vec4 u_bgColor;

    void main() {
        vec4 texColor = texture2D(u_image, v_texCoord);
        // 预乘 alpha 处理
        if (texColor.a < 0.01) discard;
        gl_FragColor = texColor;
    }
`;

      function createShader(gl, type, source) {
        const shader = gl.createShader(type);
        gl.shaderSource(shader, source);
        gl.compileShader(shader);
        if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
          console.error("Shader compile error:", gl.getShaderInfoLog(shader));
          gl.deleteShader(shader);
          return null;
        }
        return shader;
      }

      const vs = createShader(gl, gl.VERTEX_SHADER, vsSource);
      const fs = createShader(gl, gl.FRAGMENT_SHADER, fsSource);
      const program = gl.createProgram();
      gl.attachShader(program, vs);
      gl.attachShader(program, fs);
      gl.linkProgram(program);

      if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
        console.error("Program link error:", gl.getProgramInfoLog(program));
      }

      // 获取 attribute/uniform 位置
      const aPosition = gl.getAttribLocation(program, "a_position");
      const aTexCoord = gl.getAttribLocation(program, "a_texCoord");
      const uResolution = gl.getUniformLocation(program, "u_resolution");
      const uOffset = gl.getUniformLocation(program, "u_offset");
      const uScale = gl.getUniformLocation(program, "u_scale");
      const uImage = gl.getUniformLocation(program, "u_image");

      // 创建缓冲区
      const positionBuffer = gl.createBuffer();
      const texCoordBuffer = gl.createBuffer();

      // 数据解析index
      let assetData = null;
      let atlasTexture = null;
      let currentSequence = null;
      let frames = [];
      let currentFrame = 0;
      let lastFrameTime = 0;
      let isPaused = false;
      let playbackSpeed = 1;

      // 解析单帧数据，生成 WebGL 可用的顶点数组
      function parseFrame(frameData) {
        const mesh = frameData.MeshData;
        const vertices = mesh.Vertices; // [{x, y}, ...]
        const uvsRaw = mesh.UVs; // [fixed16, fixed16, ...]

        const positions = [];
        const texCoords = [];

        const quadCount = Math.floor(vertices.length / 4);

        for (let qi = 0; qi < quadCount; qi++) {
          const vi = qi * 4;
          if (vi + 3 >= vertices.length) break;

          const quad = [
            [vertices[vi].x, vertices[vi].y],
            [vertices[vi + 1].x, vertices[vi + 1].y],
            [vertices[vi + 2].x, vertices[vi + 2].y],
            [vertices[vi + 3].x, vertices[vi + 3].y],
          ];

          const ui = qi * 2;
          if (ui + 1 >= uvsRaw.length) continue;

          const uv1 = decodeUVFixed16(uvsRaw[ui]);
          const uv2 = decodeUVFixed16(uvsRaw[ui + 1]);

          const uMin = Math.min(uv1[0], uv2[0]);
          const uMax = Math.max(uv1[0], uv2[0]);
          // Unity 的 V 坐标通常是 bottom-up，需要翻转
          const vMin = Math.min(uv1[1], uv2[1]);
          const vMax = Math.max(uv1[1], uv2[1]);

          // 两个三角形组成四边形: (0,1,2) 和 (0,2,3)
          const indices = [0, 1, 2, 0, 2, 3];

          for (const idx of indices) {
            positions.push(quad[idx][0], quad[idx][1]);
            // UV 坐标映射
            const u = idx === 1 || idx === 2 ? uMax : uMin;
            const v = idx === 2 || idx === 3 ? vMax : vMin;
            texCoords.push(u, 1.0 - v); // 翻转 V 坐标
          }
        }

        return { positions, texCoords, vertexCount: positions.length / 2 };
      }

      // 加载资源index
      async function loadAsset(jsonUrl, atlasUrl) {
        // 加载 JSON
        const res = await fetch(jsonUrl);
        assetData = await res.json();

        // 加载 Atlas 纹理
        const img = new Image();
        img.crossOrigin = "anonymous";
        await new Promise((resolve, reject) => {
          img.onload = resolve;
          img.onerror = reject;
          img.src = atlasUrl;
        });

        // 创建 WebGL 纹理
        atlasTexture = gl.createTexture();
        gl.bindTexture(gl.TEXTURE_2D, atlasTexture);
        gl.texImage2D(
          gl.TEXTURE_2D,
          0,
          gl.RGBA,
          gl.RGBA,
          gl.UNSIGNED_BYTE,
          img,
        );
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);

        // 填充序列选择器
        const select = document.getElementById("sequenceSelect");
        select.innerHTML = "";
        assetData.Sequences.forEach((seq) => {
          const opt = document.createElement("option");
          opt.value = seq.Name;
          opt.textContent = `${seq.Name} (${seq.Frames.length} frames)`;
          select.appendChild(opt);
        });

        // 默认播放第一个序列
        loadSequence(assetData.Sequences[0].Name);
      }

      function loadSequence(name) {
        currentSequence = assetData.Sequences.find((s) => s.Name === name);
        if (!currentSequence) return;

        // 预解析所有帧
        frames = currentSequence.Frames.map(parseFrame);
        currentFrame = 0;

        // 计算包围盒，自动调整画布
        const allVerts = currentSequence.Frames.flatMap(
          (f) => f.MeshData.Vertices,
        );
        const minX = Math.min(...allVerts.map((v) => v.x));
        const maxX = Math.max(...allVerts.map((v) => v.x));
        const minY = Math.min(...allVerts.map((v) => v.y));
        const maxY = Math.max(...allVerts.map((v) => v.y));

        const scale = parseFloat(document.getElementById("scale").value);
        const padding = 20;
        const meshW = maxX - minX || 1;
        const meshH = maxY - minY || 1;
        let w = Math.ceil(meshW * scale) + padding * 2;
        let h = Math.ceil(meshH * scale) + padding * 2;

        const maxW = Math.max(window.innerWidth, 200);
        const maxH = Math.max(window.innerHeight - 100, 200);
        let effectiveScale = scale;
        if (w > maxW || h > maxH) {
          const scaleW = (maxW - padding * 2) / meshW;
          const scaleH = (maxH - padding * 2) / meshH;
          effectiveScale = Math.min(scaleW, scaleH, scale);
          w = Math.ceil(meshW * effectiveScale) + padding * 2;
          h = Math.ceil(meshH * effectiveScale) + padding * 2;
        }

        canvas.width = w;
        canvas.height = h;
        gl.viewport(0, 0, w, h);

        const offsetX = padding - minX * effectiveScale;
        const offsetY = padding + maxY * effectiveScale;

        window._canvasOffset = [offsetX, offsetY];
        window._canvasSize = [w, h];
        window._effectiveScale = effectiveScale;

        document.getElementById("info").textContent =
          `序列: ${name} | 帧数: ${frames.length} | 画布: ${w}x${h}`;
      }

      // 渲染循环index
      function render(time) {
        if (!frames.length || !atlasTexture) {
          requestAnimationFrame(render);
          return;
        }

        const fps = assetData.FrameRate || 24;
        const frameDuration = 1000 / fps;

        if (!isPaused) {
          const elapsed = time - lastFrameTime;
          if (elapsed >= frameDuration / playbackSpeed) {
            currentFrame = (currentFrame + 1) % frames.length;
            lastFrameTime = time;
          }
        }

        const frame = frames[currentFrame];

        // 清空画布
        gl.clearColor(0, 0, 0, 0);
        gl.clear(gl.COLOR_BUFFER_BIT);
        gl.enable(gl.BLEND);
        gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);

        gl.useProgram(program);

        // 绑定位置数据
        gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
        gl.bufferData(
          gl.ARRAY_BUFFER,
          new Float32Array(frame.positions),
          gl.STATIC_DRAW,
        );
        gl.enableVertexAttribArray(aPosition);
        gl.vertexAttribPointer(aPosition, 2, gl.FLOAT, false, 0, 0);

        // 绑定 UV 数据
        gl.bindBuffer(gl.ARRAY_BUFFER, texCoordBuffer);
        gl.bufferData(
          gl.ARRAY_BUFFER,
          new Float32Array(frame.texCoords),
          gl.STATIC_DRAW,
        );
        gl.enableVertexAttribArray(aTexCoord);
        gl.vertexAttribPointer(aTexCoord, 2, gl.FLOAT, false, 0, 0);

        // 设置 uniform
        gl.uniform2f(uResolution, window._canvasSize[0], window._canvasSize[1]);
        gl.uniform2fv(uOffset, window._canvasOffset);
        gl.uniform1f(
          uScale,
          window._effectiveScale ||
            parseFloat(document.getElementById("scale").value),
        );
        gl.uniform1i(uImage, 0);

        // 绑定纹理
        gl.activeTexture(gl.TEXTURE0);
        gl.bindTexture(gl.TEXTURE_2D, atlasTexture);

        // 绘制
        gl.drawArrays(gl.TRIANGLES, 0, frame.vertexCount);

        requestAnimationFrame(render);
      }

      // 事件绑定index
      document
        .getElementById("sequenceSelect")
        .addEventListener("change", (e) => {
          loadSequence(e.target.value);
        });

      document.getElementById("speed").addEventListener("input", (e) => {
        playbackSpeed = parseFloat(e.target.value);
      });

      document.getElementById("scale").addEventListener("input", (e) => {
        // 重新加载序列以调整画布大小
        if (currentSequence) loadSequence(currentSequence.Name);
      });

      document.getElementById("pauseBtn").addEventListener("click", (e) => {
        isPaused = !isPaused;
        e.target.textContent = isPaused ? "播放" : "暂停";
      });

      // 启动index
      loadAsset("./4913.pet.json", "./4913._Atlas_.png");

      requestAnimationFrame(render);
    </script>
  </body>
</html>
